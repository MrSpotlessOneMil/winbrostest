name: SMS Regression Tests

on:
  push:
    branches: [Test]
  pull_request:
    branches: [main, Test]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit & integration tests
        run: npm test

      - name: Test results summary
        if: failure()
        run: echo "::error::Tests failed — check the logs above for details. A recent code change may have broken an SMS flow."
